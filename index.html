<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NTH · Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Inconsolata:wght@800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #dad7cd;
      --surface: #c9c6bc;
      --nav-h: 64px;
      --accent: #50574d;
      --accent2: #50574d;
      --text: #50574d;
      --muted: #7a8276;
      --border: rgba(80,87,77,0.18);
      --radius: 4px;
      --col-min: 220px;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* NOISE OVERLAY */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.028;
      pointer-events: none;
      z-index: 9999;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: rgba(218,215,205,0.88);
      backdrop-filter: blur(18px) saturate(1.4);
      -webkit-backdrop-filter: blur(18px) saturate(1.4);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .logo-mark {
      width: 32px; height: 32px;
      border: 1.5px solid var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .logo-mark::after {
      content: '';
      width: 10px; height: 10px;
      background: var(--accent2);
      border-radius: 50%;
    }
    .logo-text {
      font-family: 'Special Elite', serif;
      font-size: 1.15rem;
      color: var(--accent);
      letter-spacing: 0.04em;
    }

    .nav-actions { display: flex; align-items: center; gap: 12px; }

    .count-badge {
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: var(--muted);
      text-transform: uppercase;
      font-weight: 500;
    }

    #add-btn {
      width: 38px; height: 38px;
      border-radius: 50%;
      border: 1.5px solid var(--accent2);
      background: transparent;
      color: var(--accent);
      font-size: 1.4rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.18s, box-shadow 0.2s;
      line-height: 1;
      padding-bottom: 1px;
    }
    #add-btn:hover {
      background: var(--accent2);
      color: var(--bg);
      transform: rotate(45deg) scale(1.08);
      box-shadow: 0 0 18px rgba(201,169,110,0.35);
    }
    #file-input { display: none; }

    /* MAIN */
    main {
      padding-top: calc(var(--nav-h) + 32px);
      padding-bottom: 60px;
    }

    /* EMPTY STATE */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - var(--nav-h));
      gap: 16px;
      opacity: 0;
      animation: fadeIn 0.8s 0.3s forwards;
    }
    #empty-state svg { opacity: 0.2; }
    #empty-state p {
      font-family: 'Inconsolata', monospace;
      font-weight: 800;
      font-size: 1.4rem;
      color: var(--muted);
    }
    #empty-state span {
      font-size: 0.8rem;
      color: var(--muted);
      opacity: 0.6;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* MASONRY GRID */
    #gallery {
      columns: var(--col-min);
      column-gap: 12px;
      padding: 0 20px;
    }

    /* PHOTO CARD */
    .photo-item {
      break-inside: avoid;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
      border-radius: 3px;
      cursor: pointer;
      opacity: 0;
      transform: translateY(22px) scale(0.97);
      animation: itemIn 0.55s cubic-bezier(0.22,1,0.36,1) forwards;
      background: var(--surface);
    }
    .photo-item img {
      display: block;
      width: 100%;
      height: auto;
      transition: transform 0.5s cubic-bezier(0.22,1,0.36,1);
    }
    .photo-item:hover img { transform: scale(1.04); }

    .photo-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.55) 0%, transparent 55%);
      opacity: 0;
      transition: opacity 0.3s;
      display: flex;
      align-items: flex-end;
      padding: 14px;
    }
    .photo-item:hover .photo-overlay { opacity: 1; }

    .photo-date {
      font-size: 0.72rem;
      letter-spacing: 0.06em;
      color: rgba(240,236,228,0.7);
      text-transform: uppercase;
    }

    .delete-btn {
      position: absolute;
      top: 10px; right: 10px;
      width: 28px; height: 28px;
      border-radius: 50%;
      border: none;
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-size: 0.85rem;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.25s, background 0.2s;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .photo-item:hover .delete-btn { opacity: 1; }
    .delete-btn:hover { background: rgba(200,60,60,0.7); }

    /* LIGHTBOX */
    #lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.92);
      z-index: 200;
      display: none;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
      animation: lbIn 0.22s ease;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 40px 80px rgba(0,0,0,0.8);
      animation: imgIn 0.28s cubic-bezier(0.22,1,0.36,1);
    }
    #lb-close {
      position: absolute;
      top: 22px; right: 26px;
      background: none;
      border: none;
      color: var(--text);
      font-size: 1.6rem;
      cursor: pointer;
      opacity: 0.6;
      transition: opacity 0.2s;
      line-height: 1;
    }
    #lb-close:hover { opacity: 1; }
    #lb-nav {
      position: absolute;
      bottom: 24px; left: 50%;
      transform: translateX(-50%);
      display: flex; gap: 8px;
    }
    .lb-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }
    .lb-dot.active { background: var(--accent); transform: scale(1.4); }

    /* DRAG DROP OVERLAY */
    #drop-zone {
      position: fixed;
      inset: 0;
      background: rgba(201,169,110,0.08);
      border: 2px dashed var(--accent2);
      z-index: 150;
      display: none;
      align-items: center;
      justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-style: italic;
      color: var(--accent);
      letter-spacing: 0.02em;
    }
    #drop-zone.active { display: flex; }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--accent);
      padding: 10px 20px;
      border-radius: 40px;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      z-index: 300;
      white-space: nowrap;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes itemIn { to { opacity: 1; transform: none; } }
    @keyframes lbIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes imgIn { from { transform: scale(0.94); opacity: 0; } to { transform: none; opacity: 1; } }

    /* RESPONSIVE */
    @media (max-width: 480px) {
      :root { --col-min: 160px; }
      nav { padding: 0 16px; }
      #gallery { padding: 0 12px; column-gap: 8px; }
      .photo-item { margin-bottom: 8px; }
    }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="#">
    <span class="logo-text">Gallery</span>
  </a>
  <div class="nav-actions">
    <span class="count-badge" id="count-label">0 ảnh</span>
    <button id="add-btn" title="Thêm ảnh" aria-label="Thêm ảnh">+</button>
    <input type="file" id="file-input" accept="image/*" multiple />
  </div>
</nav>

<main>
  <div id="empty-state">
    <svg width="56" height="56" viewBox="0 0 56 56" fill="none">
      <rect x="4" y="14" width="48" height="34" rx="3" stroke="#50574d" stroke-width="1.5"/>
      <circle cx="18" cy="26" r="4" stroke="#50574d" stroke-width="1.5"/>
      <path d="M4 38l12-10 8 8 8-6 12 10" stroke="#50574d" stroke-width="1.5" stroke-linejoin="round"/>
    </svg>
    <p>Bộ sưu tập của bạn trống</p>
    <span>Nhấn + để thêm ảnh đầu tiên</span>
  </div>
  <div id="gallery"></div>
</main>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lb-close">✕</button>
  <img id="lb-img" src="" alt="" />
  <div id="lb-nav"></div>
</div>

<!-- Drag-drop overlay -->
<div id="drop-zone">Thả ảnh vào đây</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  const gallery    = document.getElementById('gallery');
  const emptyState = document.getElementById('empty-state');
  const fileInput  = document.getElementById('file-input');
  const addBtn     = document.getElementById('add-btn');
  const countLabel = document.getElementById('count-label');
  const lightbox   = document.getElementById('lightbox');
  const lbImg      = document.getElementById('lb-img');
  const lbClose    = document.getElementById('lb-close');
  const lbNav      = document.getElementById('lb-nav');
  const dropZone   = document.getElementById('drop-zone');
  const toast      = document.getElementById('toast');

  let photos = [];       // {id, src, date}
  let currentLb = null;

  // ──────────────── UTILITIES ────────────────

  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

  function fmtDate(d) {
    return d.toLocaleDateString('vi-VN', { day:'2-digit', month:'2-digit', year:'numeric' });
  }

  function showToast(msg, dur = 2200) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), dur);
  }

  function updateCount() {
    const n = photos.length;
    countLabel.textContent = n === 0 ? '0 ảnh' : `${n} ảnh`;
  }

  function syncEmpty() {
    emptyState.style.display = photos.length === 0 ? 'flex' : 'none';
  }

  // ──────────────── ADD PHOTOS ────────────────

  function addPhotos(files) {
    if (!files || !files.length) return;
    let added = 0;
    Array.from(files).forEach(file => {
      if (!file.type.startsWith('image/')) return;
      const reader = new FileReader();
      reader.onload = e => {
        const photo = { id: uid(), src: e.target.result, date: fmtDate(new Date()) };
        photos.push(photo);
        renderCard(photo, true);
        updateCount();
        syncEmpty();
        added++;
        if (added === 1) showToast('✓ Đã thêm ảnh');
      };
      reader.readAsDataURL(file);
    });
  }

  // ──────────────── RENDER CARD ────────────────

  // Random span heights to create "collapsed" feel
  function randomSpan() {
    const opts = [1, 1, 1, 2]; // mostly 1-col span feel
    return opts[Math.floor(Math.random() * opts.length)];
  }

  function renderCard(photo, animate) {
    const item = document.createElement('div');
    item.className = 'photo-item';
    item.dataset.id = photo.id;
    item.style.animationDelay = animate ? `${Math.random() * 0.12}s` : '0s';

    // Random slight rotation for organic feel
    const rot = (Math.random() - 0.5) * 1.4;
    item.style.transform = `translateY(22px) scale(0.97) rotate(${rot}deg)`;
    item.style.setProperty('--rot', `${rot}deg`);

    item.innerHTML = `
      <img src="${photo.src}" alt="Ảnh ${photo.date}" loading="lazy" />
      <div class="photo-overlay">
        <span class="photo-date">${photo.date}</span>
      </div>
      <button class="delete-btn" title="Xóa ảnh">✕</button>
    `;

    item.querySelector('img').addEventListener('click', () => openLightbox(photo.id));
    item.querySelector('.delete-btn').addEventListener('click', e => {
      e.stopPropagation();
      deletePhoto(photo.id, item);
    });

    gallery.appendChild(item);
  }

  // ──────────────── DELETE ────────────────

  function deletePhoto(id, el) {
    el.style.transition = 'opacity 0.3s, transform 0.3s';
    el.style.opacity = '0';
    el.style.transform = 'scale(0.88)';
    setTimeout(() => {
      el.remove();
      photos = photos.filter(p => p.id !== id);
      updateCount();
      syncEmpty();
      if (currentLb === id) closeLightbox();
      else buildLbNav();
      showToast('Đã xóa ảnh');
    }, 300);
  }

  // ──────────────── LIGHTBOX ────────────────

  function openLightbox(id) {
    currentLb = id;
    const photo = photos.find(p => p.id === id);
    if (!photo) return;
    lbImg.src = photo.src;
    lightbox.classList.add('open');
    buildLbNav();
    document.body.style.overflow = 'hidden';
  }

  function closeLightbox() {
    lightbox.classList.remove('open');
    currentLb = null;
    document.body.style.overflow = '';
  }

  function buildLbNav() {
    lbNav.innerHTML = '';
    photos.forEach(p => {
      const dot = document.createElement('div');
      dot.className = 'lb-dot' + (p.id === currentLb ? ' active' : '');
      dot.addEventListener('click', () => openLightbox(p.id));
      lbNav.appendChild(dot);
    });
  }

  function lbMove(dir) {
    const idx = photos.findIndex(p => p.id === currentLb);
    if (idx < 0) return;
    const next = photos[(idx + dir + photos.length) % photos.length];
    if (next) openLightbox(next.id);
  }

  lbClose.addEventListener('click', closeLightbox);
  lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });
  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowRight') lbMove(1);
    if (e.key === 'ArrowLeft') lbMove(-1);
  });

  // ──────────────── FILE INPUT ────────────────

  addBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', e => {
    addPhotos(e.target.files);
    fileInput.value = '';
  });

  // ──────────────── DRAG & DROP ────────────────

  let dragCounter = 0;

  document.addEventListener('dragenter', e => {
    e.preventDefault();
    dragCounter++;
    dropZone.classList.add('active');
  });
  document.addEventListener('dragleave', () => {
    dragCounter--;
    if (dragCounter <= 0) { dragCounter = 0; dropZone.classList.remove('active'); }
  });
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => {
    e.preventDefault();
    dragCounter = 0;
    dropZone.classList.remove('active');
    addPhotos(e.dataTransfer.files);
  });

  // ──────────────── SWIPE LIGHTBOX ────────────────

  let touchStartX = 0;
  lightbox.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  lightbox.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) lbMove(dx < 0 ? 1 : -1);
  });

  // ──────────────── INIT ────────────────
  syncEmpty();
  updateCount();
</script>
</body>
</html>
