<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NTH's Gallery</title>
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #dad7cd;
      --text: #50574d;
      --accent: #50574d;
      --card-bg: #ece9e1;
      --shadow: rgba(80,87,77,0.13);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Lora', Georgia, serif;
      min-height: 100vh;
    }

    /* ── NAV BAR ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 32px;
      height: 64px;
      background: var(--bg);
      border-bottom: 1.5px solid rgba(80,87,77,0.15);
      backdrop-filter: blur(6px);
    }

    .nav-logo {
      font-family: 'Special Elite', cursive;
      font-size: 1.55rem;
      letter-spacing: 0.04em;
      color: var(--text);
      user-select: none;
    }

    .nav-add {
      width: 38px;
      height: 38px;
      border: 1.5px solid var(--text);
      border-radius: 50%;
      background: transparent;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
      color: var(--text);
    }
    .nav-add:hover {
      background: var(--text);
      color: var(--bg);
    }
    .nav-add svg { pointer-events: none; }

    /* ── NAV COUNT ── */
    .nav-right {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .nav-count {
      font-family: 'Special Elite', cursive;
      font-size: 0.85rem;
      letter-spacing: 0.12em;
      color: rgba(80,87,77,0.6);
      text-transform: uppercase;
    }

    /* ── MASONRY GRID ── */
    #gallery {
      padding: 36px 28px 60px;
      columns: 4 220px;
      column-gap: 18px;
    }

    .photo-card {
      break-inside: avoid;
      margin-bottom: 18px;
      border-radius: 4px;
      overflow: hidden;
      background: var(--card-bg);
      box-shadow: 0 2px 12px var(--shadow);
      position: relative;
      cursor: pointer;
      animation: collapse-in 0.55s cubic-bezier(0.22,1,0.36,1) both;
    }

    @keyframes collapse-in {
      from { opacity: 0; transform: translateY(24px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .photo-card img {
      display: block;
      width: 100%;
      height: auto;
      transition: transform 0.4s ease;
    }
    .photo-card:hover img { transform: scale(1.04); }

    .photo-card .overlay {
      position: absolute;
      inset: 0;
      background: rgba(80,87,77,0);
      transition: background 0.3s;
      display: flex;
      align-items: flex-end;
      padding: 14px;
    }
    .photo-card:hover .overlay { background: rgba(80,87,77,0.25); }

    .photo-card .del-btn {
      display: none;
      position: absolute;
      top: 8px; right: 8px;
      background: rgba(218,215,205,0.88);
      border: none;
      border-radius: 50%;
      width: 28px; height: 28px;
      font-size: 14px;
      cursor: pointer;
      color: var(--text);
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
    }
    .photo-card:hover .del-btn { display: flex; }
    .photo-card .del-btn:hover { background: #e07070; color: #fff; }

    /* ── EMPTY STATE ── */
    #empty-state {
      position: fixed;
      inset: 64px 0 0 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      pointer-events: none;
    }
    #empty-state svg { opacity: 0.28; margin-bottom: 6px; }
    #empty-state .es-title {
      font-family: 'Special Elite', cursive;
      font-size: 1.1rem;
      font-weight: bold;
      letter-spacing: 0.04em;
      color: var(--text);
      opacity: 0.75;
    }
    #empty-state .es-sub {
      font-family: 'Special Elite', cursive;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text);
      opacity: 0.4;
    }

    /* ── MODAL / LIGHTBOX ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(30,30,26,0.82);
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(8px);
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 90vw;
      max-height: 88vh;
      border-radius: 4px;
      box-shadow: 0 8px 48px rgba(0,0,0,0.4);
    }
    #lightbox-close {
      position: absolute;
      top: 22px; right: 28px;
      background: none;
      border: none;
      color: #ece9e1;
      font-size: 2rem;
      cursor: pointer;
      line-height: 1;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    #lightbox-close:hover { opacity: 1; }

    /* ── UPLOAD TOAST ── */
    #toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--text);
      color: var(--bg);
      padding: 10px 22px;
      border-radius: 24px;
      font-size: 0.85rem;
      letter-spacing: 0.03em;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
      z-index: 300;
      font-family: 'Lora', serif;
    }
    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ── SPINNER ── */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(80,87,77,0.2);
      border-top-color: var(--text);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── HIDDEN FILE INPUT ── */
    #file-input { display: none; }

    /* ── DRAG OVERLAY ── */
    #drag-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 150;
      background: rgba(218,215,205,0.88);
      border: 3px dashed rgba(80,87,77,0.4);
      align-items: center;
      justify-content: center;
      font-family: 'Special Elite', cursive;
      font-size: 1.4rem;
      color: var(--text);
      letter-spacing: 0.08em;
    }
    #drag-overlay.show { display: flex; }

    @media (max-width: 600px) {
      #gallery { columns: 2 140px; padding: 20px 12px 48px; }
      nav { padding: 0 16px; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <span class="nav-logo">Gallery</span>
  <div class="nav-right">
    <span class="nav-count" id="nav-count">0 ẢNH</span>
    <button class="nav-add" id="add-btn" title="Thêm ảnh">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="9" y1="2" x2="9" y2="16"/>
        <line x1="2" y1="9" x2="16" y2="9"/>
      </svg>
    </button>
  </div>
</nav>

<!-- HIDDEN FILE INPUT -->
<input type="file" id="file-input" accept="image/*" multiple />

<!-- GALLERY GRID -->
<div id="gallery">
  <div id="empty-state">
    <svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="#50574d" stroke-width="1.5">
      <rect x="6" y="10" width="36" height="28" rx="3"/>
      <circle cx="17" cy="20" r="3"/>
      <polyline points="6,32 15,22 22,30 29,22 42,34"/>
    </svg>
    <span class="es-title">Bộ sưu tập của bạn trống</span>
    <span class="es-sub">Nhấn + để thêm ảnh đầu tiên</span>
  </div>
</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <button id="lightbox-close">×</button>
  <img id="lightbox-img" src="" alt=""/>
</div>

<!-- DRAG OVERLAY -->
<div id="drag-overlay">Thả ảnh vào đây</div>

<!-- TOAST -->
<div id="toast"></div>

<!-- FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, onSnapshot, query, orderBy }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyA8i1xZQBMzvQZj0opix1wQiSgvCPtx14s",
    authDomain: "nbao-f08cc.firebaseapp.com",
    projectId: "nbao-f08cc",
    storageBucket: "nbao-f08cc.firebasestorage.app",
    messagingSenderId: "211816413076",
    appId: "1:211816413076:web:66fe6539c2558f5fde0181",
    measurementId: "G-SNX97L72X3"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const COLLECTION = "gallery_photos";

  // ── Cloudinary config ──
  const CLOUD_NAME = "ddz0y80eh";
  const UPLOAD_PRESET = "ny7yscu9"; // unsigned preset

  // ── DOM refs ──
  const gallery     = document.getElementById("gallery");
  const emptyState  = document.getElementById("empty-state");
  const addBtn      = document.getElementById("add-btn");
  const fileInput   = document.getElementById("file-input");
  const lightbox    = document.getElementById("lightbox");
  const lbImg       = document.getElementById("lightbox-img");
  const lbClose     = document.getElementById("lightbox-close");
  const toast       = document.getElementById("toast");
  const dragOverlay = document.getElementById("drag-overlay");
  const navCount    = document.getElementById("nav-count");

  // ── Toast helper ──
  let toastTimer;
  function showToast(msg, duration = 2800) {
    toast.innerHTML = msg;
    toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove("show"), duration);
  }

  // ── Collapse-randomly heights (for masonry feel) ──
  // We keep natural image ratio; "randomly" refers to staggered animation delay
  function randomDelay() {
    return (Math.random() * 0.35).toFixed(2) + "s";
  }

  // ── Render a single photo card ──
  function renderCard(id, url, timestamp) {
    // Remove empty state
    emptyState.style.display = "none";

    const card = document.createElement("div");
    card.className = "photo-card";
    card.dataset.id = id;
    card.style.animationDelay = randomDelay();

    const img = document.createElement("img");
    img.src = url;
    img.loading = "lazy";
    img.alt = "";

    const overlay = document.createElement("div");
    overlay.className = "overlay";

    const delBtn = document.createElement("button");
    delBtn.className = "del-btn";
    delBtn.title = "Xoá ảnh";
    delBtn.innerHTML = "×";
    delBtn.addEventListener("click", async (e) => {
      e.stopPropagation();
      if (!confirm("Xoá ảnh này?")) return;
      await deleteDoc(doc(db, COLLECTION, id));
      showToast("Đã xoá ảnh");
    });

    card.appendChild(img);
    card.appendChild(overlay);
    card.appendChild(delBtn);

    card.addEventListener("click", () => {
      lbImg.src = url;
      lightbox.classList.add("open");
    });

    gallery.appendChild(card);
  }

  // ── Real-time sync from Firestore ──
  const q = query(collection(db, COLLECTION), orderBy("createdAt", "desc"));
  onSnapshot(q, (snapshot) => {
    gallery.querySelectorAll(".photo-card").forEach(c => c.remove());

    const docs = snapshot.docs;
    const count = docs.length;
    navCount.textContent = count + " ẢNH";

    if (count === 0) {
      emptyState.style.display = "flex";
    } else {
      emptyState.style.display = "none";
      docs.forEach(d => renderCard(d.id, d.data().url, d.data().createdAt));
    }
  });

  // ── Upload to Cloudinary ──
  async function uploadToCloudinary(file) {
    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", UPLOAD_PRESET);

    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
      method: "POST",
      body: formData
    });
    if (!res.ok) throw new Error("Cloudinary upload failed");
    const data = await res.json();
    return data.secure_url;
  }

  // ── Save URL to Firestore ──
  async function savePhoto(url) {
    await addDoc(collection(db, COLLECTION), {
      url,
      createdAt: Date.now()
    });
  }

  // ── Handle files ──
  async function handleFiles(files) {
    if (!files || files.length === 0) return;
    const arr = Array.from(files).filter(f => f.type.startsWith("image/"));
    if (arr.length === 0) return;

    showToast(`<span class="spinner"></span> Đang tải ${arr.length} ảnh…`, 15000);

    let uploaded = 0;
    for (const file of arr) {
      try {
        const url = await uploadToCloudinary(file);
        await savePhoto(url);
        uploaded++;
      } catch (err) {
        console.error(err);
        showToast("Lỗi khi tải ảnh: " + err.message);
      }
    }
    if (uploaded > 0) showToast(`✓ Đã thêm ${uploaded} ảnh`);
  }

  // ── Button click → file input ──
  addBtn.addEventListener("click", () => fileInput.click());
  fileInput.addEventListener("change", () => handleFiles(fileInput.files));

  // ── Drag & Drop ──
  let dragCounter = 0;
  document.addEventListener("dragenter", (e) => {
    e.preventDefault();
    dragCounter++;
    dragOverlay.classList.add("show");
  });
  document.addEventListener("dragleave", () => {
    dragCounter--;
    if (dragCounter <= 0) { dragCounter = 0; dragOverlay.classList.remove("show"); }
  });
  document.addEventListener("dragover", (e) => e.preventDefault());
  document.addEventListener("drop", (e) => {
    e.preventDefault();
    dragCounter = 0;
    dragOverlay.classList.remove("show");
    handleFiles(e.dataTransfer.files);
  });

  // ── Lightbox close ──
  lbClose.addEventListener("click", () => lightbox.classList.remove("open"));
  lightbox.addEventListener("click", (e) => {
    if (e.target === lightbox) lightbox.classList.remove("open");
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") lightbox.classList.remove("open");
  });
</script>
</body>
</html>
